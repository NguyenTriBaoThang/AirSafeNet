worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # ── Gzip ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml
        application/json application/javascript
        application/xml+rss application/atom+xml
        image/svg+xml;

    # ── Rate limiting ─────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # ══════════════════════════════════════════════════════════════════
    # HTTP → HTTPS redirect (prod only — comment out for dev)
    # ══════════════════════════════════════════════════════════════════
    # server {
    #     listen 80;
    #     server_name yourdomain.com;
    #     return 301 https://$host$request_uri;
    # }

    # ══════════════════════════════════════════════════════════════════
    # MAIN SERVER — HTTP (dev/demo)
    # ══════════════════════════════════════════════════════════════════
    server {
        listen 80;
        server_name localhost;

        # ── Frontend (React SPA) ──────────────────────────────────────
        location / {
            proxy_pass         http://frontend:80;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # ── Backend API ───────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass         http://backend:7276;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeout cho streaming AI responses
            proxy_read_timeout  120s;
            proxy_send_timeout  120s;
            proxy_connect_timeout 10s;

            # CORS headers
            add_header Access-Control-Allow-Origin  "$http_origin" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # ── Auth endpoints — stricter rate limit ──────────────────────
        location /api/auth/ {
            limit_req zone=auth burst=10 nodelay;

            proxy_pass         http://backend:7276;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Backend Swagger (dev only — remove in prod) ───────────────
        location /swagger/ {
            proxy_pass http://backend:7276;
            proxy_set_header Host $host;
        }

        # ── AI Server (internal only — not exposed to internet) ───────
        # Uncomment if you want to expose AI docs
        # location /ai/ {
        #     proxy_pass http://ai_server:8000/;
        # }

        # ── Health checks ─────────────────────────────────────────────
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ── Security headers ──────────────────────────────────────────
        add_header X-Frame-Options        "SAMEORIGIN"   always;
        add_header X-XSS-Protection       "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff"       always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        # ── Block common attack paths ─────────────────────────────────
        location ~* \.(git|env|htaccess|htpasswd|sql|bak)$ {
            deny all;
            return 404;
        }
    }

    # ══════════════════════════════════════════════════════════════════
    # HTTPS SERVER (prod — uncomment and configure SSL)
    # ══════════════════════════════════════════════════════════════════
    # server {
    #     listen 443 ssl http2;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     # ... same location blocks as above
    # }
}
