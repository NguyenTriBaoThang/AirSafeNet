name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  docs-check:
    name: Docs Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required docs
        run: |
          test -f README.md
          test -f ARCHITECTURE.md
          test -f BRANCHING.md
          test -f COMPETITION_SUBMISSION.md
          test -f DEMO_SCRIPT.md
          test -f MODEL_VERSIONING.md
          test -f CONTRIBUTING.md
          test -f SECURITY.md
          test -f SUPPORT.md
          test -f .env.example

  python-syntax:
    name: Python Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Python files exist
        id: pyfiles
        shell: bash
        run: |
          if find src/airsafenet_ai -type f -name "*.py" | grep -q .; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Syntax check
        if: steps.pyfiles.outputs.found == 'true'
        run: |
          python -m compileall src/airsafenet_ai

      - name: Skip Python check
        if: steps.pyfiles.outputs.found != 'true'
        run: echo "No Python files found in src/airsafenet_ai"

  dotnet-check:
    name: .NET Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Check .NET project files exist
        id: dotnetfiles
        shell: bash
        run: |
          if find src/airsafenet_backend -type f \( -name "*.csproj" -o -name "*.sln" \) | grep -q .; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Restore
        if: steps.dotnetfiles.outputs.found == 'true'
        run: dotnet restore src/airsafenet_backend/airsafenet_backend.sln

      - name: Build
        if: steps.dotnetfiles.outputs.found == 'true'
        run: dotnet build src/airsafenet_backend/airsafenet_backend.sln --no-restore --configuration Release

      - name: Skip .NET check
        if: steps.dotnetfiles.outputs.found != 'true'
        run: echo "No .NET solution or project files found in src/airsafenet_backend"