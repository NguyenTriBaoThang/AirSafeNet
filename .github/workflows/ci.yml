name: CI — Build, Lint & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════
  #  FRONTEND: TypeScript + ESLint + Vite Build
  # ═══════════════════════════════════════════════════════════════
  frontend:
    name: 🎨 Frontend (React + TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/airsafenet_frontend

    steps:
      - uses: actions/checkout@v6

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/airsafenet_frontend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 TypeScript type check
        run: npx tsc --noEmit

      - name: 🧹 ESLint
        run: npm run lint

      - name: 🏗️ Build production
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:7276

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: frontend-dist
          path: src/airsafenet_frontend/dist
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════
  #  BACKEND: ASP.NET Core 8 Build + Test
  # ═══════════════════════════════════════════════════════════════
  backend:
    name: 🔧 Backend (ASP.NET Core 8)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/airsafenet_backend

    steps:
      - uses: actions/checkout@v6

      - name: ⚙️ Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: 📦 Restore dependencies
        run: dotnet restore

      - name: 🏗️ Build (Release)
        run: dotnet build --no-restore --configuration Release

      - name: 🧪 Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════
  #  AI SERVER: Python Lint + Import Check
  # ═══════════════════════════════════════════════════════════════
  ai-server:
    name: 🤖 AI Server (FastAPI Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/airsafenet_ai

    steps:
      - uses: actions/checkout@v6

      - name: ⚙️ Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: src/airsafenet_ai/requirements.txt

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: 🧹 Lint (flake8)
        run: flake8 app/ --max-line-length=120 --ignore=E501,W503
        continue-on-error: true

      - name: ✅ Import check
        run: python -c "from app.api import app; print('FastAPI app OK')"
        env:
          OPENAQ_API_KEY: test_key
          ADMIN_KEY: test_admin_key

  # ═══════════════════════════════════════════════════════════════
  #  DOCKER: Build verification (main only)
  # ═══════════════════════════════════════════════════════════════
  docker-build:
    name: 🐳 Docker Build Check
    runs-on: ubuntu-latest
    needs: [frontend, backend, ai-server]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: src/airsafenet_frontend
          push: false
          tags: airsafenet/frontend:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🐳 Build backend image
        uses: docker/build-push-action@v7
        with:
          context: src/airsafenet_backend
          push: false
          tags: airsafenet/backend:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🐳 Build AI server image
        uses: docker/build-push-action@v7
        with:
          context: src/airsafenet_ai
          push: false
          tags: airsafenet/ai-server:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
